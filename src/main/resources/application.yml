spring:
  application:
    name: weighing

  datasource:
    url: jdbc:postgresql://localhost:5432/weighing
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

stabilization:
  window-size: 10
  std-dev-threshold: 50.0
  buffer-ttl-seconds: 30

pricing:
  min-margin: 0.05
  max-margin: 0.20
  max-stock-tons: 1000.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
